<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

  <div class="dashboard-wrapper">
    <h1>Welcome to Your Dashboard</h1>
    <p class="dashboard-subtitle">
      Here’s a quick overview of your reservations.
    </p>

    <div class="stats-container">
      <div class="stat-box">
        <h3>Total Reservations</h3>
        <div class="stat-number" id="totalReservations">--</div>
      </div>

      <div class="stat-box">
        <h3>Upcoming Reservations</h3>
        <div class="stat-number" id="upcomingReservations">--</div>
      </div>
    </div>

    <div class="search-container">
      <h3>Search Available Items</h3>

      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search items or types (e.g. room, tutor, JBWS)..."
      >

      <select id="typeFilter">
        <option value="">All Types</option>
        <option value="room">Room</option>
        <option value="resource">Resource</option>
        <option value="person">Person</option>
       </select>

       <ul id="searchResults"></ul>
    </div>

    <div class="dashboard-actions">
      <a href="/profile" class="btn-link">View Profile</a>
      <a href="/reserve" class="btn-link">Make Reservation</a>
      <a href="/my_reservations_page" class="btn-link">Edit Reservations</a>
    </div>
  </div>

  <script>
    async function loadDashboardStats() {
      try {
        const res = await fetch("/dashboard-stats");

        if (res.status === 401) {
          // Not logged in → send back to login
          window.location.href = "login.html";
          return;
        }

        if (!res.ok) {
          throw new Error("Failed to load stats");
        }

        const data = await res.json();

        document.getElementById("totalReservations").textContent =
          data.total ?? 0;

        document.getElementById("upcomingReservations").textContent =
          data.upcoming ?? 0;

      } catch (err) {
        console.error("Dashboard error:", err);
        document.getElementById("totalReservations").textContent = "0";
        document.getElementById("upcomingReservations").textContent = "0";
      }
    }

    // Load stats when page opens
    loadDashboardStats();

    const searchInput = document.getElementById("searchInput");
    const typeFilter = document.getElementById("typeFilter");
    const resultsList = document.getElementById("searchResults");

    let debounceTimer;

    // search function
    async function searchItems() {
      const query = searchInput.value.trim().toLowerCase();
      const type = typeFilter.value;

      // empty search → return nothing
      if (!query && !type) {
        resultsList.innerHTML = "";
        return;
      }

      try {
        const res = await fetch(`/search?q=${query}&type=${type}`);

        if (!res.ok) throw new Error("Search failed");

        const items = await res.json();

        resultsList.innerHTML = "";

        //  no results
        if (items.length === 0) {
          resultsList.innerHTML = "<li>No results found</li>";
          return;
        }

        //  render results
        items.forEach(item => {
          const li = document.createElement("li");

          li.textContent = `${item.name} (${item.type})`;

          // Optional: click → go reserve page with item pre-selected
          li.addEventListener("click", () => {
            window.location.href = `/reserve?item_id=${item.id}`;
          });

          resultsList.appendChild(li);
        });

      } catch (err) {
        console.error(err);
        resultsList.innerHTML = "<li>Error loading results</li>";
      }
    }

    //  debounce for better UX
    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(searchItems, 300);
    });

    typeFilter.addEventListener("change", searchItems);
    
    
  </script>
  <script src="/components/navbar.js"></script>

</body>
</html>
