<!DOCTYPE html>
<html>
<head>
  <title>Create Reservation</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h2>Create Reservation</h2>
  <form id="reservationForm">
    <label>Item Type:</label>
    <select id="itemType" required>
      <option value="room">Room</option>
      <option value="resource">Resource</option>
      <option value="person">Person</option>
    </select>

    <label>Select Item:</label>
    <select id="itemSelect" required>
      <option value="" disabled selected> Select an item type</option>
      <option value="">Loading items...</option>
    </select>

    <label>Start Date:</label>
    <input type="datetime-local" id="startDate" required>

    <label>End Date:</label>
    <input type="datetime-local" id="endDate" required>

    <button type="submit">Reserve</button>
  </form>



  <div id="calendar"></div>
  <p id="message"></p>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
  <script src="calendar.js" defer></script>
  



  <script>
    const form = document.getElementById("reservationForm");
    const itemTypeSelect = document.getElementById("itemType");
    const itemSelect = document.getElementById("itemSelect");

    itemTypeSelect.addEventListener("change", loadItems);
    document.getElementById("startDate").addEventListener("change", loadItems);
    document.getElementById("endDate").addEventListener("change", loadItems);

    async function loadItems() {
      const type = itemTypeSelect.value;
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      const response = await fetch(`/inventory/available?type=${type}&start=${startDate || ""}&end=${endDate || ""}`);
      const items = await response.json();

      itemSelect.innerHTML = "";

      if (items.length === 0) {
        itemSelect.innerHTML = `<option value="">No items available</option>`;
        return;
      }

      items.forEach(item => {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = `${item.name} (ID: ${item.id})`;
        itemSelect.appendChild(option);
      });
    }

    // Load default items on page load
    loadItems();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const startDate = new Date(document.getElementById("startDate").value);
      const endDate = new Date(document.getElementById("endDate").value);
      const message = document.getElementById("message");

      const now = new Date();

      if (startDate < now) {
        message.textContent = "Start date cannot be in the past";
        return;
      }

      const diffDays = (endDate - startDate) / (1000 * 60 * 60 * 24);

      if (diffDays > 7) {
        message.textContent = "Reservations cannot exceed 7 days";
        return;
      }

      const reservation = {
        item_id: itemSelect.value,
        start_date: document.getElementById("startDate").value,
        end_date: document.getElementById("endDate").value
      };

      const response = await fetch("/reservations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(reservation)
      });

      const data = await response.json();

      if (response.ok) {
        message.textContent = "Reservation created successfully!";
        form.reset();
        await loadItems(); // Refresh available items
      } else {
        message.textContent = data.error || "Error creating reservation";
      }
    });
  </script>
  <script src="/components/navbar.js"></script>




</body>
</html>
