<!DOCTYPE html>
<html>
<head>
  <title>My Reservations</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h2>My Reservations</h2>

  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Item Name</th>
        <th>Item Type</th>
        <th>Start</th>
        <th>End</th>
        <th>Edit</th>
        <th>Cancel</th>
      </tr>
    </thead>
    <tbody id="reservationTable"></tbody>
  </table>

  <script>
    async function loadReservations() {
      const response = await fetch("/my-reservations");

      if (!response.ok) {
        alert("Please login first");
        return;
      }

      const reservations = await response.json();
      const table = document.getElementById("reservationTable");
      table.innerHTML = "";

      reservations.forEach(r => {
        const row = document.createElement("tr");
        const start = new Date(r.start_date).toLocaleString();
        const end = new Date(r.end_date).toLocaleString();
        const now = new Date();
        const startTime = new Date(r.start_date);

        let editButton = "";
        if (startTime > now) {
          editButton = `
            <td>
              <button onclick="window.location='/edit-reservation?id=${r.id}'">
                Edit
              </button>
            </td>
          `;
        } 

        row.innerHTML = `
          <td>${r.id}</td>
          <td>${r.item_name}</td>
          <td>${r.item_type}</td>
          <td>${start}</td>
          <td>${end}</td>

          <td>${editButton}</td>

          <td>
            <button onclick="deleteReservation(${r.id})">
              Cancel
            </button>
          </td>
        `;

        table.appendChild(row);
      });
    }

    async function deleteReservation(id) {
      await fetch("/reservations/" + id, { method: "DELETE" });
      loadReservations();
    }

    loadReservations();
  </script>
  <script src="/components/navbar.js"></script>
</body>
</html>
