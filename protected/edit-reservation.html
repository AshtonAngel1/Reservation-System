<!DOCTYPE html>
<html>
<head>
  <title>Edit Reservation</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<h2>Edit Reservation</h2>

<p id="message"></p>
<div id="errorBox" style="color:red;"></div>

<form id="editForm">
  <input type="hidden" id="reservationId">

  <label>Item Type:</label>
  <span id="itemType"></span>

  <label>Item:</label>
  <span id="itemName"></span>

  <input type="hidden" id="itemSelect">

  <label>Start Date:</label>
  <input type="datetime-local" id="startDate" required>

  <label>End Date:</label>
  <input type="datetime-local" id="endDate" required>

  <button type="submit">Update Reservation</button>
</form>

<script>
const urlParams = new URLSearchParams(window.location.search);
const reservationId = urlParams.get("id");

const itemSelect = document.getElementById("itemSelect");
const startInput = document.getElementById("startDate");
const endInput = document.getElementById("endDate");
const message = document.getElementById("message");
const errorBox = document.getElementById("errorBox");

let currentReservation = null;

document.getElementById("reservationId").value = reservationId;

if (!reservationId) {
  errorBox.textContent = "Reservation ID missing";
  throw new Error("Missing reservation id");
}

// Function to convert UTC datetime string to local datetime input format
function toLocalInputValue(utcString) {
  const date = new Date(utcString);

  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');

  return `${year}-${month}-${day}T${hours}:${minutes}`;
}

async function loadReservation() {
  try {
    const res = await fetch(`/reservations/${reservationId}`);
    const reservation = await res.json();

    if (!res.ok) {
      errorBox.textContent = reservation.error || "Failed to load reservation";
      return;
    }

    document.getElementById("itemType").textContent = reservation.item_type;

    if (!reservation.item_type) {
      throw new Error("Missing item_type from backend")
    }

    document.getElementById("itemName").textContent = reservation.item_name;
    itemSelect.value = reservation.item_id;
    
    startInput.value = toLocalInputValue(reservation.start_date);
    endInput.value = toLocalInputValue(reservation.end_date);

  } catch (err) {
    console.error(err);
    errorBox.textContent = "Failed to load reservation";
  }
}

loadReservation();

document.getElementById("editForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBox.textContent = "";
  message.textContent = "";
  
  const startDate = new Date(startInput.value);
  const endDate = new Date(endInput.value);

  const reservation = {
    item_id: itemSelect.value,
    start_date: startDate.toISOString(),
    end_date: endDate.toISOString()
  };

  const response = await fetch(`/reservations/${reservationId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(reservation)
  });

  const data = await response.json();

  if (response.ok) {
    message.textContent = "Reservation updated successfully";
    setTimeout(() => {
      window.location.href = "/my_reservations_page";
    }, 1200);
    
  } else {
    message.textContent = data.error || "Failed to update reservation";
  }
});
</script>

<script src="/components/navbar.js"></script>
</body>
</html>
