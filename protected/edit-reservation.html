<!DOCTYPE html>
<html>
<head>
  <title>Edit Reservation</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<h2>Edit Reservation</h2>

<p id="message"></p>
<div id="errorBox" style="color:red;"></div>

<form id="editForm">
  <input type="hidden" id="reservationId">

  <label>Item Type:</label>
  <span id="itemType"></span>

  <label>Select Item:</label>
  <select id="itemSelect"></select>

  <label>Start Date:</label>
  <input type="datetime-local" id="startDate" required>

  <label>End Date:</label>
  <input type="datetime-local" id="endDate" required>

  <button type="submit">Update Reservation</button>
</form>

<script>
const urlParams = new URLSearchParams(window.location.search);
const reservationId = urlParams.get("id");

const itemTypeSpan = document.getElementById("itemType");
const itemSelect = document.getElementById("itemSelect");
const startInput = document.getElementById("startDate");
const endInput = document.getElementById("endDate");
const message = document.getElementById("message");
const errorBox = document.getElementById("errorBox");

let currentReservation = null;

document.getElementById("reservationId").value = reservationId;

startInput.addEventListener("change", loadItems);
endInput.addEventListener("change", loadItems);

if (!reservationId) {
  errorBox.textContent = "Reservation ID missing";
  throw new Error("Missing reservation id");
}

function addOption(value, text, selected = false) {
  const option = document.createElement("option");
  option.value = String(value);
  option.textContent = text;
  if (selected) option.selected = true;
  itemSelect.appendChild(option);
}

async function loadItems() {
  try {
    const type = itemTypeSpan.textContent.trim();
    const start = startInput.value;
    const end = endInput.value;

    if (!type || !start || !end) return;

    const res = await fetch(`/inventory/available?type=${encodeURIComponent(type)}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`);
    const items = await res.json();

    itemSelect.innerHTML = "";

    if (!Array.isArray(items) || items.length === 0) {
      // keep current reserved item as fallback option
      if (currentReservation) {
        addOption(
          currentReservation.item_id,
          `${currentReservation.item_name} (current selection)`,
          true
        );
      } else {
        addOption("", "No items available", true);
      }
      return;
    }

    items.forEach(item => {
      addOption(item.id, item.name, false);
    });

    // ensure current item is selectable even if not in available list
    if (currentReservation) {
      const exists = items.some(i => Number(i.id) === Number(currentReservation.item_id));
      if (!exists) {
        addOption(
          currentReservation.item_id,
          `${currentReservation.item_name} (current selection)`,
          true
        );
      } else {
        itemSelect.value = String(currentReservation.item_id);
      }
    }
  } catch (err) {
    console.error(err);
    errorBox.textContent = "Failed to load available items.";
  }
}

async function loadReservation() {
  try {
    const res = await fetch(`/reservations/${reservationId}`);
    const reservation = await res.json();

    if (!res.ok) {
      errorBox.textContent = reservation.error || "Failed to load reservation";
      return;
    }

    currentReservation = reservation;
    itemTypeSpan.textContent = reservation.item_type;
    startInput.value = reservation.start_date.slice(0, 16);
    endInput.value = reservation.end_date.slice(0, 16);

    await loadItems();
  } catch (err) {
    console.error(err);
    errorBox.textContent = "Failed to load reservation";
  }
}

loadReservation();

document.getElementById("editForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBox.textContent = "";
  message.textContent = "";

  const startDate = new Date(startInput.value);
  const endDate = new Date(endInput.value);
  const now = new Date();
  now.setSeconds(0, 0);

  if (startDate < now) {
    message.textContent = "Start date cannot be in the past";
    return;
  }

  if (endDate <= startDate) {
    message.textContent = "End date must be after start date";
    return;
  }

  const reservation = {
    item_id: itemSelect.value,
    start_date: startInput.value,
    end_date: endInput.value
  };

  const response = await fetch(`/reservations/${reservationId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(reservation)
  });

  const data = await response.json();

  if (response.ok) {
    message.textContent = "Reservation updated successfully";
    setTimeout(() => {
      window.location.href = "/my_reservations_page";
    }, 1200);
  } else {
    message.textContent = data.error || "Failed to update reservation";
  }
});
</script>

<script src="/components/navbar.js"></script>
</body>
</html>
