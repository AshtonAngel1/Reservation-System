<!DOCTYPE html>
<html>
<head>
  <title>Edit Reservation</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<h2>Edit Reservation</h2>

<p id="message"></p>

<div id="errorBox" style="color:red;"></div>

<form id="editForm">
  <input type="hidden" id="reservationId">

  <label>Item Type:</label>
  <select id="itemType">
    <option value="room">Room</option>
    <option value="resource">Resource</option>
    <option value="person">Person</option>
  </select>

  <label>Select Item:</label>
  <select id="itemSelect"></select>

  <label>Start Date:</label>
  <input type="datetime-local" id="startDate">

  <label>End Date:</label>
  <input type="datetime-local" id="endDate">

  <button type="submit">Update Reservation</button>
</form>

<script>

const urlParams = new URLSearchParams(window.location.search);
const reservationId = urlParams.get("id");

const itemTypeSelect = document.getElementById("itemType");
const itemSelect = document.getElementById("itemSelect");

document.getElementById("reservationId").value = reservationId;

itemTypeSelect.addEventListener("change", loadItems);
document.getElementById("startDate").addEventListener("change", loadItems);
document.getElementById("endDate").addEventListener("change", loadItems);

// Load items
async function loadItems() {
  const type = itemTypeSelect.value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  const res = await fetch(`/inventory/available?type=${type}&start=${start}&end=${end}`);
  const items = await res.json();

  itemSelect.innerHTML = "";

  items.forEach(item => {
    const option = document.createElement("option");
    option.value = item.id;
    option.textContent = item.name;
    itemSelect.appendChild(option);
  });
}

loadItems();

document.getElementById("editForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const reservation = {
    item_id: itemSelect.value,
    start_date: document.getElementById("startDate").value,
    end_date: document.getElementById("endDate").value
  };

  const response = await fetch(`/reservations/${reservationId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(reservation)
  });

  const data = await response.json();

  const message = document.getElementById("message");

  if (response.ok) {
    message.textContent = "Reservation updated successfully";
  } else {
    message.textContent = data.error;
  }
});

</script>
<script src="/components/navbar.js"></script>

</body>
</html>
