<!DOCTYPE html>
<html>
<head>
  <title>User Profile</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .profile-container { max-width: 900px; margin: auto; }
    .profile-header { display: flex; align-items: center; gap: 20px; }
    .profile-header img { width: 120px; border-radius: 50%; }
    .bio-section { margin-top: 20px; }
    .reservations-section { margin-top: 40px; }
    .reservation-box {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }
    textarea { width: 100%; height: 80px; }
    button { padding: 6px 12px; margin-top: 5px; }
    h3 { margin-top: 30px; }
  </style>
</head>
<body>

<div class="profile-container">

  <h1>User Profile</h1>

  <div class="profile-header">
    <img src="/images/default-profile.png" alt="Profile Picture">
    <div>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>User ID:</strong> <span id="userId"></span></p>
    </div>
  </div>

  <div class="bio-section">
    <h2>Biography</h2>
    <textarea id="bioInput" placeholder="Enter a short biography..."></textarea>
    <button>Save Biography</button>
    <p id="bioStatus"></p>
  </div>

  <div class="reservations-section">
    <h2>Reservation History</h2>

    <h3>Past Reservations</h3>
    <div id="pastReservations"></div>

    <h3>Today's Reservations</h3>
    <div id="todayReservations"></div>

    <h3>Future Reservations</h3>
    <div id="futureReservations"></div>
  </div>

</div>

<script>
async function loadProfile() {
  const res = await fetch("/api/profile");
  const data = await res.json();

  document.getElementById("userEmail").textContent = data.email;
  document.getElementById("userId").textContent = data.id;
  document.getElementById("bioInput").value = data.bio || "";

  loadReservations();
}

//     method: "PUT",
//     headers: { "Content-Type": "application/json" },
//     body: JSON.stringify({ bio })
//   });

//   const data = await res.json();
//   document.getElementById("bioStatus").textContent = data.message;
// }

async function loadReservations() {
  const res = await fetch("/api/reservations/my");
  const reservations = await res.json();

  const past = document.getElementById("pastReservations");
  const today = document.getElementById("todayReservations");
  const future = document.getElementById("futureReservations");

  past.innerHTML = "";
  today.innerHTML = "";
  future.innerHTML = "";

  const now = new Date();
  const todayDate = now.toISOString().split("T")[0];

  reservations.forEach(r => {
    const reservationDate = r.date.split("T")[0];

    const div = document.createElement("div");
    div.className = "reservation-box";
    div.innerHTML = `
      <p><strong>Item:</strong> ${r.item}</p>
      <p><strong>Quantity:</strong> ${r.quantity}</p>
      <p><strong>Date:</strong> ${reservationDate}</p>
    `;

    if (reservationDate < todayDate) {
      past.appendChild(div);
    } else if (reservationDate === todayDate) {
      today.appendChild(div);
    } else {
      future.appendChild(div);
    }
  });
}

loadProfile();
</script>
<script src="/components/navbar.js"></script>

</body>
</html>
