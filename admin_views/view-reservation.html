<!DOCTYPE html>
<html>
<head>
  <title>Admin - All Reservations</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h2>Upcoming Reservations</h2>

  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Item Name</th>
        <th>Item Type</th>
        <th>User Email</th>
        <th>Start</th>
        <th>End</th>
        <th>Cancel</th>
      </tr>
    </thead>
    <tbody id="reservationTable"></tbody>
  </table>

  <script>
    async function loadReservations() {
      const response = await fetch("/admin/reservations");

      if (response.status === 401) {
        alert("Please login first.");
        window.location.href = "/login.html";
        return;
      }

      if (response.status === 403) {
        alert("You are not authorized to view this page.");
        window.location.href = "/";
        return;
      }

      if (!response.ok) {
        alert("Something went wrong.");
        return;
      }

      const reservations = await response.json();
      const table = document.getElementById("reservationTable");
      table.innerHTML = "";

      const now = new Date();

      // Show only upcoming/active reservations to match heading
      const upcoming = reservations.filter(r => new Date(r.end_date) >= now);

      upcoming.forEach(r => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${r.id}</td>
          <td>${r.item_name}</td>
          <td>${r.item_type}</td>
          <td>${r.user_email}</td>
          <td>${new Date(r.start_date).toLocaleString()}</td>
          <td>${new Date(r.end_date).toLocaleString()}</td>
          <td>
            <button onclick="deleteReservation(${r.id})">Cancel</button>
          </td>
        `;
        table.appendChild(row);
      });
    }

    async function deleteReservation(id) {
      await fetch("/admin/reservations/" + id, { method: "DELETE" });
      loadReservations();
    }

    loadReservations();
  </script>
  <script src="/components/navbar.js"></script>
</body>
</html>
