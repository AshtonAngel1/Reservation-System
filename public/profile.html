<!DOCTYPE html>
<html>
<head>
  <title>User Profile</title>
  <link rel="stylesheet" href="/styles.css">

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }

    .profile-container {
      max-width: 900px;
      margin: auto;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .profile-header img {
      width: 120px;
      border-radius: 50%;
    }

    .bio-section { margin-top: 20px; }

    .reservations-section { margin-top: 40px; }

    .reservation-box {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }

    textarea {
      width: 100%;
      height: 80px;
    }

    button {
      padding: 6px 12px;
      margin-top: 5px;
    }

    h3 { margin-top: 30px; }
  </style>
</head>

<body>

<div class="profile-container">

  <h1>User Profile</h1>

  <div class="profile-header">
    <img id="profilePicture" src="/components/profile-pic.png" alt="Profile Picture">

    <div>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>User ID:</strong> <span id="userId"></span></p>
    </div>
  </div>

  <div class="bio-section">
    <h2>Biography</h2>

    <textarea id="bioInput" placeholder="Enter a short biography..."></textarea>

    <button id="updateBioBtn">Save Biography</button>

    <p id="bioStatus"></p>
  </div>

  <div class="reservations-section">

    <h2>Reservation History</h2>

    <h3>Past Reservations</h3>
    <ul id="pastReservations"></ul>

    <h3>Today's Reservations</h3>
    <ul id="todayReservations"></ul>

    <h3>Future Reservations</h3>
    <ul id="futureReservations"></ul>

  </div>

</div>

<script src="/components/navbar.js"></script>
<script src="/components/profile.js"></script>

</body>
</html>
